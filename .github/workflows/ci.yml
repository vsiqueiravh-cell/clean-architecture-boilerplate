name: ci

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore CleanArchitectureBoilerplate.slnx

      - name: Format
        run: dotnet format CleanArchitectureBoilerplate.slnx --verify-no-changes

      - name: Build
        run: dotnet build CleanArchitectureBoilerplate.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test CleanArchitectureBoilerplate.slnx --configuration Release --no-build --collect:"XPlat Code Coverage"

      - name: Docker build
        run: docker build --tag clean-architecture-boilerplate:ci .
