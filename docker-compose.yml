services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clean-architecture-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=clean_architecture;Username=clean;Password=clean
      Jwt__SigningKey: local-development-signing-key-change-before-production
    ports:
      - "8080:8080"

  postgres:
    image: postgres:18-alpine
    container_name: clean-architecture-postgres
    environment:
      POSTGRES_DB: clean_architecture
      POSTGRES_USER: clean
      POSTGRES_PASSWORD: clean
    volumes:
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clean -d clean_architecture"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
